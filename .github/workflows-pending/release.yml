name: Release

on:
  push:
    tags: ["v*.*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  docker-push:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binary-build:
    name: Binary (${{ matrix.os }})
    needs: github-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (内嵌进 binary)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv pip install --system -e "." pyinstaller

      - name: Build binary
        run: pyinstaller deploy/pyinstaller/wcn.spec --distpath dist

      - name: Rename binary per platform
        shell: bash
        run: |
          mkdir -p dist-named
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/wcn.exe "dist-named/wcn-${{ github.ref_name }}-windows-x64.exe"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            cp dist/wcn "dist-named/wcn-${{ github.ref_name }}-macos-x64"
          else
            cp dist/wcn "dist-named/wcn-${{ github.ref_name }}-linux-x64"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-named/*
